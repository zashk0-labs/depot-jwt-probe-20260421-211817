name: Probe on depot-ubuntu-22.04-4

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: depot-ubuntu-22.04-4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - run: go test -v -run TestIntegrationHarness ./...
